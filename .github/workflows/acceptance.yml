name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Type check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  lint:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

  acceptance-criteria-check:
    name: Acceptance criteria
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Count unchecked acceptance criteria on linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Find the linked issue from a "Closes #N" / "Fixes #N" / "Resolves #N" line.
          ISSUE_NUM=$(printf '%s' "$PR_BODY" \
            | grep -ioE '(close[sd]?|fix(e[sd])?|resolve[sd]?) +#[0-9]+' \
            | grep -oE '#[0-9]+' | tr -d '#' | head -n1 || true)

          if [ -z "${ISSUE_NUM:-}" ]; then
            echo "::warning::No linked issue found in PR body (expected 'Closes #N'). Skipping acceptance-criteria check."
            echo "No linked issue found in PR body — add 'Closes #N' to track acceptance criteria." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Linked issue: #$ISSUE_NUM"
          BODY=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json body -q .body)

          CHECKED=$(printf '%s\n' "$BODY" | grep -cE '^\s*- \[x\]' || true)
          UNCHECKED=$(printf '%s\n' "$BODY" | grep -cE '^\s*- \[ \]' || true)
          TOTAL=$((CHECKED + UNCHECKED))

          {
            echo "## Acceptance criteria for issue #$ISSUE_NUM"
            echo ""
            echo "- Checked:   $CHECKED / $TOTAL"
            echo "- Unchecked: $UNCHECKED / $TOTAL"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$UNCHECKED" -gt 0 ]; then
            echo "::warning::$UNCHECKED of $TOTAL acceptance criteria on issue #$ISSUE_NUM are still unchecked."
            printf '%s\n' "$BODY" | grep -E '^\s*- \[ \]' >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "All $TOTAL acceptance criteria on issue #$ISSUE_NUM are checked." >> "$GITHUB_STEP_SUMMARY"
          fi
