name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Database migrations
        run: echo "No database migrations are configured for this package."
      - run: npm test
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  acceptance-criteria-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check linked issue acceptance criteria
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);

            if (!match) {
              core.warning("No linked issue found. Add `Closes #N` to the PR body so acceptance criteria can be tracked.");
              return;
            }

            const issue_number = Number(match[1]);
            const { owner, repo } = context.repo;
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number,
            });

            const criteria = [...(issue.body || "").matchAll(/^- \[( |x|X)\] .+$/gm)];
            if (criteria.length === 0) {
              core.warning(`Linked issue #${issue_number} has no acceptance criteria checklist items.`);
              return;
            }

            const checked = criteria.filter((criterion) => criterion[1].toLowerCase() === "x").length;
            const unchecked = criteria.length - checked;

            await core.summary
              .addHeading("Acceptance Criteria")
              .addRaw(`Linked issue: #${issue_number}\n\n`)
              .addRaw(`Checked: ${checked}/${criteria.length}\n\n`)
              .addRaw(`Unchecked: ${unchecked}/${criteria.length}\n`)
              .write();

            if (unchecked > 0) {
              core.warning(`${unchecked} acceptance criteria remain unchecked on linked issue #${issue_number}.`);
            }
